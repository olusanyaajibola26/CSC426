<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRO — Issues Reporting Outlet</title>
<style>
  :root{
    --bg:#0e1116;
    --panel:#161b22;
    --panel-2:#1c2330;
    --border:#2a3140;
    --accent:#3ddc97;
    --accent-2:#f97316;
    --text:#e6edf3;
    --muted:#8b96a5;
    --danger:#ef4444;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    padding:28px 24px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  header h1{
    margin:0;
    font-size:22px;
    letter-spacing:0.5px;
  }
  header h1 span{color:var(--accent);}
  header p{margin:4px 0 0; color:var(--muted); font-size:13px;}
  .tabs{display:flex; gap:8px;}
  .tab-btn{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
  }
  .tab-btn.active{background:var(--accent); color:#04140d; font-weight:600; border-color:var(--accent);}
  main{max-width:900px; margin:0 auto; padding:24px;}
  .view{display:none;}
  .view.active{display:block;}
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:22px;
    margin-bottom:18px;
  }
  label{display:block; font-size:13px; color:var(--muted); margin:14px 0 6px;}
  input, select, textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:8px;
    font-size:14px;
  }
  textarea{min-height:90px; resize:vertical;}
  .row{display:flex; gap:14px; flex-wrap:wrap;}
  .row > div{flex:1; min-width:180px;}
  button.submit{
    margin-top:18px;
    background:var(--accent-2);
    border:none;
    color:#1a0d02;
    font-weight:700;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
  }
  .msg{margin-top:10px; font-size:13px; color:var(--accent); display:none;}
  .filters{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
  .filters select{width:auto; min-width:150px;}
  .issue{
    background:var(--panel);
    border:1px solid var(--border);
    border-left:4px solid var(--accent-2);
    border-radius:10px;
    padding:16px;
    margin-bottom:12px;
  }
  .issue-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .issue-title{font-weight:600; font-size:15px;}
  .badge{
    font-size:11px;
    padding:3px 10px;
    border-radius:20px;
    background:var(--panel-2);
    color:var(--muted);
    border:1px solid var(--border);
    white-space:nowrap;
  }
  .badge.open{color:var(--danger); border-color:var(--danger);}
  .badge.resolved{color:var(--accent); border-color:var(--accent);}
  .meta{font-size:12px; color:var(--muted); margin-top:6px;}
  .desc{margin-top:8px; font-size:13px; color:#c3ccd6; line-height:1.5;}
  .empty{text-align:center; color:var(--muted); padding:40px 0; font-size:14px;}
  .stats{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:18px;}
  .stat{
    flex:1; min-width:130px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    text-align:center;
  }
  .stat b{font-size:24px; display:block; color:var(--accent);}
  .stat span{font-size:12px; color:var(--muted);}
  .toggle-status{
    background:none;
    border:1px solid var(--border);
    color:var(--muted);
    padding:4px 10px;
    border-radius:6px;
    font-size:11px;
    cursor:pointer;
    margin-top:8px;
    width:auto;
  }
  footer{text-align:center; padding:24px; color:var(--muted); font-size:12px;}
</style>
</head>
<body>

<header>
  <div>
    <h1>IRO — Issues <span>Reporting</span> Outlet</h1>
    <p>For AAUA Students & Indigenes of Akungba, Iwaro, Etioro & Ayegunle</p>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-view="report">Report Issue</button>
    <button class="tab-btn" data-view="dashboard">Dashboard</button>
  </div>
</header>

<main>

  <!-- REPORT VIEW -->
  <section class="view active" id="report">
    <div class="card">
      <h3 style="margin-top:0;">Submit an Issue</h3>
      <div class="row">
        <div>
          <label>Your Name</label>
          <input type="text" id="f-name" placeholder="e.g. Ojo Silas Ayomide">
        </div>
        <div>
          <label>You Are</label>
          <select id="f-role">
            <option value="Student">Student</option>
            <option value="Indigene">Indigene</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Community</label>
          <select id="f-community">
            <option>Akungba</option>
            <option>Iwaro</option>
            <option>Etioro</option>
            <option>Ayegunle</option>
          </select>
        </div>
        <div>
          <label>Issue Category</label>
          <select id="f-category">
            <option>Land / Property Dispute</option>
            <option>Security / Theft</option>
            <option>Rent / Housing Exploitation</option>
            <option>Noise / Rowdy Behaviour</option>
            <option>Sanitation / Environment</option>
            <option>Market / Business Dispute</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <label>Describe the Issue</label>
      <textarea id="f-desc" placeholder="Explain what happened, where, and when..."></textarea>
      <button class="submit" onclick="submitIssue()">Submit Report</button>
      <div class="msg" id="success-msg">✔ Issue submitted successfully.</div>
    </div>
  </section>

  <!-- DASHBOARD VIEW -->
  <section class="view" id="dashboard">
    <div class="stats" id="stats"></div>
    <div class="filters">
      <select id="filter-community" onchange="renderIssues()">
        <option value="">All Communities</option>
        <option>Akungba</option>
        <option>Iwaro</option>
        <option>Etioro</option>
        <option>Ayegunle</option>
      </select>
      <select id="filter-status" onchange="renderIssues()">
        <option value="">All Statuses</option>
        <option>Open</option>
        <option>Resolved</option>
      </select>
    </div>
    <div id="issues-list"></div>
  </section>

</main>

<footer>IRO Prototype — CSC426 Weekend 3 Submission</footer>

<script>
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById(t.dataset.view).classList.add('active');
    if(t.dataset.view === 'dashboard') renderIssues();
  }));

  function getIssues(){
    return JSON.parse(localStorage.getItem('iro_issues') || '[]');
  }
  function saveIssues(list){
    localStorage.setItem('iro_issues', JSON.stringify(list));
  }

  function submitIssue(){
    const name = document.getElementById('f-name').value.trim();
    const role = document.getElementById('f-role').value;
    const community = document.getElementById('f-community').value;
    const category = document.getElementById('f-category').value;
    const desc = document.getElementById('f-desc').value.trim();

    if(!name || !desc){
      alert('Please fill in your name and a description.');
      return;
    }

    const issue = {
      id: Date.now(),
      name, role, community, category, desc,
      status: 'Open',
      date: new Date().toLocaleString()
    };

    const list = getIssues();
    list.unshift(issue);
    saveIssues(list);

    document.getElementById('f-name').value = '';
    document.getElementById('f-desc').value = '';
    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(()=> msg.style.display='none', 2500);
  }

  function toggleStatus(id){
    const list = getIssues().map(i => {
      if(i.id === id) i.status = i.status === 'Open' ? 'Resolved' : 'Open';
      return i;
    });
    saveIssues(list);
    renderIssues();
  }

  function renderIssues(){
    const list = getIssues();
    const communityFilter = document.getElementById('filter-community').value;
    const statusFilter = document.getElementById('filter-status').value;

    const filtered = list.filter(i =>
      (!communityFilter || i.community === communityFilter) &&
      (!statusFilter || i.status === statusFilter)
    );

    // stats
    const open = list.filter(i=>i.status==='Open').length;
    const resolved = list.filter(i=>i.status==='Resolved').length;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><b>${list.length}</b><span>Total Issues</span></div>
      <div class="stat"><b>${open}</b><span>Open</span></div>
      <div class="stat"><b>${resolved}</b><span>Resolved</span></div>
    `;

    const container = document.getElementById('issues-list');
    if(filtered.length === 0){
      container.innerHTML = '<div class="empty">No issues found.</div>';
      return;
    }

    container.innerHTML = filtered.map(i => `
      <div class="issue">
        <div class="issue-top">
          <div>
            <div class="issue-title">${i.category} — ${i.community}</div>
            <div class="meta">${i.role}: ${i.name} · ${i.date}</div>
          </div>
          <span class="badge ${i.status.toLowerCase()}">${i.status}</span>
        </div>
        <div class="desc">${i.desc}</div>
        <button class="toggle-status" onclick="toggleStatus(${i.id})">Mark as ${i.status === 'Open' ? 'Resolved' : 'Open'}</button>
      </div>
    `).join('');
  }

  renderIssues();
</script>

</body>
</html>
